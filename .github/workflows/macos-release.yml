name: macOS Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 1.0.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build DMG
    runs-on: macos-15
    env:
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
      HAS_APPLE_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      HAS_DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION != '' }}
      HAS_SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY != '' }}
      HAS_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY != '' }}
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="1.0.${GITHUB_RUN_NUMBER}"
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate public release signing setup
        shell: bash
        run: |
          missing=()
          [[ "${HAS_APPLE_CERTIFICATE}" == "true" ]] || missing+=("APPLE_CERTIFICATE_BASE64")
          [[ "${HAS_APPLE_NOTARY}" == "true" ]] || missing+=("APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID")
          [[ "${HAS_DEVELOPER_ID_APPLICATION}" == "true" ]] || missing+=("DEVELOPER_ID_APPLICATION")
          [[ "${HAS_SPARKLE_PUBLIC_ED_KEY}" == "true" ]] || missing+=("SPARKLE_PUBLIC_ED_KEY")
          [[ "${HAS_SPARKLE_PRIVATE_ED_KEY}" == "true" ]] || missing+=("SPARKLE_PRIVATE_ED_KEY")

          if (( ${#missing[@]} > 0 )); then
            printf 'This workflow publishes public installable releases, so it requires signing/notarization secrets.\n' >&2
            printf 'Missing:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            printf '\nUse CI artifacts for unsigned test builds, or add these repository secrets before publishing a release.\n' >&2
            exit 1
          fi

      - name: Validate scripts
        run: |
          bash -n mac/package_app.sh
          bash -n scripts/build_portable_python.sh
          bash -n scripts/create_dmg.sh
          python3 -m py_compile scripts/write_appcast.py
          PYTHON_STANDALONE_ASSET_URL=https://example.com/python.tar.gz \
            PYTHON_STANDALONE_RESOLVE_ONLY=1 \
            scripts/build_portable_python.sh

      - name: Build portable Python runtime
        run: scripts/build_portable_python.sh

      - name: Import Developer ID certificate
        if: ${{ env.HAS_APPLE_CERTIFICATE == 'true' }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build app bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_BUILD: ${{ steps.version.outputs.build }}
          LANGCHECK_UPDATE_FEED_URL: https://github.com/${{ github.repository }}/releases/latest/download/appcast.xml
          PYENGINE_PYTHON_DIR: ${{ github.workspace }}/mac/build/python-runtime
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          SPARKLE_PUBLIC_ED_KEY: ${{ secrets.SPARKLE_PUBLIC_ED_KEY }}
        run: mac/package_app.sh

      - name: Verify app bundle
        run: mac/dist/LangCheck.app/Contents/MacOS/LangCheck --selftest

      - name: Notarize app bundle
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          ditto -c -k --keepParent mac/dist/LangCheck.app "$RUNNER_TEMP/LangCheck.zip"
          set +e
          SUBMIT_OUTPUT="$(xcrun notarytool submit "$RUNNER_TEMP/LangCheck.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)"
          STATUS=$?
          set -e
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID="$(echo "$SUBMIT_OUTPUT" | sed -n 's/^[[:space:]]*id: //p' | tail -n 1)"
          if [[ "$STATUS" -ne 0 || "$SUBMIT_OUTPUT" == *"status: Invalid"* ]]; then
            if [[ -n "$SUBMISSION_ID" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi
          xcrun stapler staple mac/dist/LangCheck.app

      - name: Create DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/create_dmg.sh

      - name: Sign DMG
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          codesign --force --timestamp --sign "$SIGN_IDENTITY" mac/dist/*.dmg
          codesign --verify --verbose=2 mac/dist/*.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          DMG="$(ls mac/dist/LangCheck-*.dmg | head -n 1)"
          set +e
          SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)"
          STATUS=$?
          set -e
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID="$(echo "$SUBMIT_OUTPUT" | sed -n 's/^[[:space:]]*id: //p' | tail -n 1)"
          if [[ "$STATUS" -ne 0 || "$SUBMIT_OUTPUT" == *"status: Invalid"* ]]; then
            if [[ -n "$SUBMISSION_ID" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi
          xcrun stapler staple "$DMG"

      - name: Sign update for Sparkle
        id: sparkle
        env:
          SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY }}
        shell: bash
        run: |
          DMG="$(ls mac/dist/LangCheck-*.dmg | head -n 1)"
          SIGN_UPDATE="$(find mac/LangCheck/.build "$HOME/Library/Caches/org.swift.swiftpm" -path '*/sign_update' -type f -perm +111 -print -quit 2>/dev/null || true)"
          if [[ -z "$SIGN_UPDATE" ]]; then
            echo "Could not find Sparkle sign_update tool." >&2
            exit 1
          fi
          OUTPUT="$(printf '%s' "$SPARKLE_PRIVATE_ED_KEY" | "$SIGN_UPDATE" --ed-key-file - "$DMG")"
          echo "$OUTPUT"
          SIG="$(echo "$OUTPUT" | sed -n 's/.*sparkle:edSignature="\([^"]*\)".*/\1/p')"
          if [[ -z "$SIG" ]]; then
            echo "Could not parse Sparkle edSignature." >&2
            exit 1
          fi
          echo "signature=$SIG" >> "$GITHUB_OUTPUT"

      - name: Verify Gatekeeper acceptance
        shell: bash
        run: |
          DMG="$(ls mac/dist/LangCheck-*.dmg | head -n 1)"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG"
          spctl --assess --type execute --verbose=4 mac/dist/LangCheck.app
          xcrun stapler validate "$DMG"
          xcrun stapler validate mac/dist/LangCheck.app

      - name: Write appcast
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          DMG="$(ls mac/dist/LangCheck-*.dmg | head -n 1)"
          DMG_NAME="$(basename "$DMG")"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/$DMG_NAME"
          scripts/write_appcast.py \
            --version "$VERSION" \
            --build "$BUILD" \
            --dmg "$DMG" \
            --download-url "$DOWNLOAD_URL" \
            --ed-signature "${{ steps.sparkle.outputs.signature }}" \
            --output mac/dist/appcast.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LangCheck-${{ steps.version.outputs.version }}-macOS
          path: |
            mac/dist/LangCheck-*.dmg
            mac/dist/appcast.xml

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: LangCheck ${{ steps.version.outputs.version }}
          files: |
            mac/dist/LangCheck-*.dmg
            mac/dist/appcast.xml
          generate_release_notes: true
          make_latest: true

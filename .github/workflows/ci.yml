name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  macos:
    name: Build and Package macOS App
    runs-on: macos-15
    env:
      GITHUB_TOKEN: ${{ github.token }}
      HAS_APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
      HAS_APPLE_NOTARY: ${{ secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' && secrets.APPLE_TEAM_ID != '' }}
      HAS_DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION != '' }}
      HAS_SPARKLE_PRIVATE_ED_KEY: ${{ secrets.SPARKLE_PRIVATE_ED_KEY != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Resolve CI release version
        id: version
        shell: bash
        run: |
          VERSION="1.0.${GITHUB_RUN_NUMBER}"
          TAG="ci-${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate scripts
        run: |
          bash -n mac/package_app.sh
          bash -n scripts/build_portable_python.sh
          bash -n scripts/create_dmg.sh
          python3 -m py_compile scripts/write_appcast.py
          PYTHON_STANDALONE_ASSET_URL=https://example.com/python.tar.gz \
            PYTHON_STANDALONE_RESOLVE_ONLY=1 \
            scripts/build_portable_python.sh

      - name: Build Swift package
        working-directory: mac/LangCheck
        run: swift build

      - name: Build portable Python runtime
        run: scripts/build_portable_python.sh

      - name: Import Developer ID certificate
        if: ${{ env.HAS_APPLE_CERTIFICATE == 'true' }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: bash
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Package app bundle
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          APP_BUILD: ${{ steps.version.outputs.build }}
          PYENGINE_PYTHON_DIR: ${{ github.workspace }}/mac/build/python-runtime
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: mac/package_app.sh

      - name: Verify packaged app
        run: |
          mac/dist/LangCheck.app/Contents/MacOS/LangCheck --selftest
          codesign --verify --deep --strict --verbose=4 mac/dist/LangCheck.app
          codesign --display --verbose=4 mac/dist/LangCheck.app/Contents/MacOS/LangCheck
          codesign --display --verbose=4 mac/dist/LangCheck.app/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate
          codesign --display --verbose=4 mac/dist/LangCheck.app/Contents/Frameworks/Sparkle.framework/Versions/B/Updater.app
          codesign --display --verbose=4 mac/dist/LangCheck.app/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Downloader.xpc
          codesign --display --verbose=4 mac/dist/LangCheck.app/Contents/Frameworks/Sparkle.framework/Versions/B/XPCServices/Installer.xpc

      - name: Notarize app bundle
        if: ${{ env.HAS_APPLE_NOTARY == 'true' && env.HAS_DEVELOPER_ID_APPLICATION == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          ditto -c -k --keepParent mac/dist/LangCheck.app "$RUNNER_TEMP/LangCheck.zip"
          set +e
          SUBMIT_OUTPUT="$(xcrun notarytool submit "$RUNNER_TEMP/LangCheck.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)"
          STATUS=$?
          set -e
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID="$(echo "$SUBMIT_OUTPUT" | sed -n 's/^[[:space:]]*id: //p' | tail -n 1)"
          if [[ "$STATUS" -ne 0 || "$SUBMIT_OUTPUT" == *"status: Invalid"* ]]; then
            if [[ -n "$SUBMISSION_ID" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi
          xcrun stapler staple mac/dist/LangCheck.app

      - name: Create DMG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: scripts/create_dmg.sh

      - name: Sign DMG
        if: ${{ env.HAS_DEVELOPER_ID_APPLICATION == 'true' }}
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          codesign --force --timestamp --sign "$SIGN_IDENTITY" mac/dist/*.dmg
          codesign --verify --verbose=2 mac/dist/*.dmg

      - name: Notarize DMG
        if: ${{ env.HAS_APPLE_NOTARY == 'true' && env.HAS_DEVELOPER_ID_APPLICATION == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        shell: bash
        run: |
          DMG="$(ls mac/dist/LangCheck-*.dmg | head -n 1)"
          set +e
          SUBMIT_OUTPUT="$(xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait 2>&1)"
          STATUS=$?
          set -e
          echo "$SUBMIT_OUTPUT"
          SUBMISSION_ID="$(echo "$SUBMIT_OUTPUT" | sed -n 's/^[[:space:]]*id: //p' | tail -n 1)"
          if [[ "$STATUS" -ne 0 || "$SUBMIT_OUTPUT" == *"status: Invalid"* ]]; then
            if [[ -n "$SUBMISSION_ID" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_APP_SPECIFIC_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" || true
            fi
            exit 1
          fi
          xcrun stapler staple "$DMG"

      - name: Assess installability
        id: gatekeeper
        shell: bash
        run: |
          DMG="$(ls mac/dist/LangCheck-*.dmg | head -n 1)"
          if spctl --assess --type open --context context:primary-signature --verbose=4 "$DMG" \
            && spctl --assess --type execute --verbose=4 mac/dist/LangCheck.app \
            && xcrun stapler validate "$DMG" \
            && xcrun stapler validate mac/dist/LangCheck.app; then
            echo "installable=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::DMG is not signed/notarized for normal macOS installation. Uploading CI artifact only; skipping GitHub prerelease."
            echo "installable=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Write CI appcast
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BUILD="${{ steps.version.outputs.build }}"
          TAG="${{ steps.version.outputs.tag }}"
          DMG="$(ls mac/dist/LangCheck-*.dmg | head -n 1)"
          DMG_NAME="$(basename "$DMG")"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/$TAG/$DMG_NAME"
          scripts/write_appcast.py \
            --version "$VERSION" \
            --build "$BUILD" \
            --dmg "$DMG" \
            --download-url "$DOWNLOAD_URL" \
            --output mac/dist/appcast.xml

      - name: Upload CI DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: LangCheck-${{ steps.version.outputs.version }}-macOS
          path: |
            mac/dist/LangCheck-*.dmg
            mac/dist/appcast.xml

      - name: Publish CI prerelease
        if: github.event_name != 'pull_request' && steps.gatekeeper.outputs.installable == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: LangCheck CI Build ${{ steps.version.outputs.version }}
          prerelease: true
          make_latest: false
          body: |
            Automated CI build from `${{ github.sha }}`.

            This is a prerelease build for testing. It is not the public signed/notarized release channel.
          files: |
            mac/dist/LangCheck-*.dmg
            mac/dist/appcast.xml

      - name: Keep CI release out of public latest channel
        if: github.event_name != 'pull_request' && steps.gatekeeper.outputs.installable == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          RELEASE_ID="$(gh api "repos/${{ github.repository }}/releases/tags/${{ steps.version.outputs.tag }}" --jq .id)"
          gh api -X PATCH "repos/${{ github.repository }}/releases/$RELEASE_ID" \
            -F prerelease=true \
            -F make_latest=false
